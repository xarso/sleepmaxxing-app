<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sleepmaxxing — Join the waitlist</title>
  <style>
    body {
      background: #14162b;
      color: #f0eef6;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card { width: 100%; max-width: 360px; text-align: center; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { color: #8b8fb0; font-size: 15px; line-height: 1.4; margin: 0 0 24px; }
    input {
      width: 100%;
      background: #1e2140;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px;
      color: #f0eef6;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: #e3b168;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .msg { font-size: 13px; margin-top: 12px; }
    .msg.error { color: #e08a8a; }
    .msg.success { color: #e3b168; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sleepmaxxing</h1>
    <p id="tagline">One technique a night. Be first to know when we launch.</p>
    <form id="form">
      <input type="email" id="email" placeholder="Your email" required />
      <button type="submit" id="submit">Join the waitlist</button>
    </form>
    <p id="msg" class="msg"></p>
  </div>

  <script>
    const SUPABASE_URL = 'https://zpqhnxcolsqibyfseflz.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_4Hn6ZoXCEZvDC6c8-K-MaA_9tBrcqJt'

    const params = new URLSearchParams(window.location.search)
    const source = params.get('source') || 'direct'

    const form = document.getElementById('form')
    const emailInput = document.getElementById('email')
    const submitBtn = document.getElementById('submit')
    const msg = document.getElementById('msg')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      submitBtn.disabled = true
      msg.textContent = ''
      msg.className = 'msg'

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=minimal',
          },
          body: JSON.stringify({ email: emailInput.value, source }),
        })

        if (res.ok) {
          form.style.display = 'none'
          msg.textContent = "You're on the list. We'll email you at launch."
          msg.className = 'msg success'
        } else if (res.status === 409) {
          msg.textContent = "You're already on the list."
          msg.className = 'msg success'
        } else {
          msg.textContent = 'Something went wrong. Try again.'
          msg.className = 'msg error'
          submitBtn.disabled = false
        }
      } catch (err) {
        msg.textContent = 'Network error. Check your connection and try again.'
        msg.className = 'msg error'
        submitBtn.disabled = false
      }
    })
  </script>
</body>
</html>
